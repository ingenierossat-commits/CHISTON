<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHISTÓN</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#F5C518">
  <link rel="apple-touch-icon" href="icon512.png">
  <link rel="icon" href="icon512.png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460;
      --yellow:#F5C518; --yellow2:#FFD700;
      --green:#4ade80; --pink:#f472b6; --orange:#fb923c;
      --white:#ffffff; --dim:#a0aec0; --border:rgba(245,197,24,0.25);
      --r:12px;
    }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--white); min-height:100vh; overflow-x:hidden; }

    /* ── AUTH LAYERS ── */
    .auth-layer { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; z-index:2000; padding:20px; }
    .auth-layer.show { display:flex; }

    /* SELECCIÓN USUARIO */
    .user-box { background:var(--bg2); border:2px solid var(--border); border-radius:var(--r); padding:2rem 1.8rem; width:100%; max-width:360px; text-align:center; }
    .user-box h2 { font-family:'Fredoka One',cursive; font-size:2rem; background:linear-gradient(135deg,#F5C518,#fb923c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.3rem; }
    .user-box p { font-size:0.85rem; color:var(--dim); font-weight:600; margin-bottom:1.8rem; }
    .user-cards { display:flex; gap:1rem; justify-content:center; }
    .user-card { flex:1; background:var(--bg3); border:2px solid var(--border); border-radius:var(--r); padding:1.5rem 1rem; cursor:pointer; transition:all 0.2s; }
    .user-card:hover { border-color:var(--yellow); transform:translateY(-2px); }
    .user-card-emoji { font-size:2.5rem; margin-bottom:0.5rem; }
    .user-card-name { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--white); letter-spacing:1px; }

    /* PIN */
    .pin-box { background:var(--bg2); border:2px solid var(--yellow); border-radius:var(--r); padding:2rem 1.8rem; width:100%; max-width:320px; text-align:center; box-shadow:0 0 40px rgba(245,197,24,0.15); }
    .pin-box h3 { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--yellow); margin-bottom:0.2rem; }
    .pin-box .sub { font-size:0.78rem; color:var(--dim); font-weight:700; letter-spacing:0.1em; margin-bottom:1.5rem; }
    .pin-dots { display:flex; justify-content:center; gap:12px; margin-bottom:1.5rem; }
    .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all 0.15s; }
    .pin-dot.filled { background:var(--yellow); border-color:var(--yellow); }
    .pin-dot.error  { background:#f87171; border-color:#f87171; }
    .pin-keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .pin-key { background:var(--bg3); border:2px solid var(--border); border-radius:8px; padding:13px 0; font-family:'Nunito',sans-serif; font-size:1.2rem; font-weight:800; color:var(--white); cursor:pointer; transition:all 0.15s; user-select:none; }
    .pin-key:hover { border-color:var(--yellow); }
    .pin-key:active { background:var(--bg2); }
    .pin-key.del { font-size:1rem; color:var(--dim); }
    .pin-key.volver { font-size:0.72rem; color:var(--dim); letter-spacing:0.05em; }
    .pin-msg { font-size:0.82rem; color:#f87171; margin-top:10px; min-height:18px; font-weight:700; }

    /* ── HEADER ── */
    header { background:var(--bg2); border-bottom:3px solid var(--yellow); padding:0 1.5rem; height:70px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .logo-text { font-family:'Fredoka One',cursive; font-size:2rem; background:linear-gradient(135deg,#F5C518,#FFD700,#fb923c); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:2px; }
    .hdr-user { font-size:0.78rem; color:var(--yellow); font-weight:800; cursor:pointer; text-decoration:underline; white-space:nowrap; }
    .breadcrumb { display:flex; align-items:center; gap:0.5rem; font-size:0.8rem; font-weight:700; color:var(--dim); }
    .bc-item { cursor:pointer; transition:color 0.2s; }
    .bc-item:hover,.bc-item.active { color:var(--yellow); }
    .bc-sep { color:var(--bg3); }

    /* ── SCREENS ── */
    main { max-width:900px; margin:0 auto; padding:2rem 1.2rem 4rem; }
    .screen { display:none; }
    .screen.active { display:block; }

    /* HOME */
    .home-header { text-align:center; padding:1.5rem 0 2rem; }
    .home-header h1 { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--yellow); letter-spacing:2px; }
    .home-header p { font-size:0.85rem; color:var(--dim); font-weight:600; margin-top:0.3rem; }
    .temas-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; gap:1rem; flex-wrap:wrap; }
    .temas-count { font-size:0.8rem; color:var(--dim); font-weight:600; }
    .temas-right { display:flex; align-items:center; gap:0.8rem; }

    /* CAMPO NÚMERO */
    .num-wrap { display:flex; align-items:center; gap:0.5rem; }
    .num-label { font-size:0.75rem; color:var(--dim); font-weight:700; white-space:nowrap; }
    .inp-num { width:56px; padding:0.35rem 0.5rem; background:var(--bg3); border:2px solid var(--border); border-radius:8px; color:var(--yellow); font-family:'Fredoka One',cursive; font-size:1rem; text-align:center; outline:none; }
    .inp-num:focus { border-color:var(--yellow); }

    /* CUÉNTAME */
    .btn-cuentame { background:linear-gradient(135deg,var(--pink),var(--orange)); color:#fff; border:none; border-radius:10px; padding:0.55rem 1.2rem; font-family:'Fredoka One',cursive; font-size:1rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 15px rgba(244,114,182,0.3); white-space:nowrap; }
    .btn-cuentame:hover { transform:translateY(-2px); }

    /* TEMAS */
    .temas-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:1rem; }
    .tema-card { background:var(--bg2); border:2px solid var(--border); border-radius:var(--r); padding:1.5rem 1rem; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:0.7rem; text-align:center; min-height:100px; }
    .tema-card:hover { border-color:var(--yellow); background:var(--bg3); transform:translateY(-2px); }
    .tema-card.selected { border-color:var(--yellow); background:var(--bg3); }
    .tema-emoji { font-size:2rem; }
    .tema-nombre { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--white); letter-spacing:1px; line-height:1.3; }
    .tema-count { font-size:0.72rem; color:var(--dim); font-weight:700; }
    .tema-options { display:none; flex-direction:column; gap:0.4rem; width:100%; margin-top:0.3rem; }
    .tema-card.selected .tema-options { display:flex; }
    .tema-opt { width:100%; padding:0.4rem 0.5rem; border-radius:8px; font-family:'Nunito',sans-serif; font-size:0.72rem; font-weight:800; letter-spacing:0.05em; cursor:pointer; border:none; transition:all 0.15s; }
    .tema-opt-enter { background:var(--yellow); color:#1a1a2e; }
    .tema-opt-enter:hover { background:var(--yellow2); }
    .tema-opt-edit { background:transparent; color:var(--dim); border:1px solid rgba(160,174,192,0.3); }
    .tema-opt-edit:hover { color:var(--white); border-color:var(--dim); }
    .tema-opt-delete { background:transparent; color:#f87171; border:1px solid rgba(248,113,113,0.3); }
    .tema-opt-delete:hover { background:rgba(248,113,113,0.1); border-color:#f87171; }
    .tema-add-card { background:transparent; border:2px dashed rgba(245,197,24,0.3); border-radius:var(--r); padding:1.5rem 1rem; cursor:pointer; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.5rem; min-height:100px; color:var(--yellow); font-family:'Fredoka One',cursive; font-size:0.9rem; letter-spacing:1px; }
    .tema-add-card:hover { border-color:var(--yellow); background:rgba(245,197,24,0.05); }
    .tema-add-icon { font-size:2rem; }

    /* CHISTES */
    .page-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:2px solid var(--border); flex-wrap:wrap; gap:1rem; }
    .page-hdr h1 { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--yellow); letter-spacing:1px; }
    .page-sub { font-size:0.78rem; color:var(--dim); font-weight:600; margin-top:0.2rem; }
    .back-btn { display:inline-flex; align-items:center; gap:0.4rem; font-size:0.78rem; font-weight:800; letter-spacing:0.05em; color:var(--dim); cursor:pointer; transition:color 0.2s; background:none; border:none; margin-bottom:1.2rem; padding:0; font-family:'Nunito',sans-serif; }
    .back-btn:hover { color:var(--yellow); }
    .btn-subir-top { background:transparent; border:2px solid rgba(245,197,24,0.4); border-radius:8px; padding:0.45rem 0.9rem; color:var(--yellow); font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:800; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .btn-subir-top:hover { border-color:var(--yellow); background:rgba(245,197,24,0.08); }
    .chistes-list { display:flex; flex-direction:column; gap:0.8rem; }
    .chiste-row { background:var(--bg2); border:2px solid var(--border); border-radius:var(--r); overflow:hidden; transition:border-color 0.2s; }
    .chiste-row:hover { border-color:rgba(245,197,24,0.5); }
    .chiste-hdr { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.2rem; cursor:pointer; user-select:none; transition:background 0.2s; }
    .chiste-hdr:hover { background:var(--bg3); }
    .chiste-hdr-left { display:flex; align-items:center; gap:0.8rem; }
    .chiste-check { width:18px; height:18px; accent-color:var(--yellow); cursor:pointer; flex-shrink:0; }
    .chiste-chevron { font-size:0.7rem; color:var(--yellow); transition:transform 0.2s; }
    .chiste-row.open .chiste-chevron { transform:rotate(90deg); }
    .chiste-nombre { font-size:1rem; font-weight:800; color:var(--white); }
    .chiste-acts { display:flex; gap:0.4rem; }
    .chiste-body { display:none; padding:0 1.2rem 1.2rem; border-top:1px solid var(--border); }
    .chiste-row.open .chiste-body { display:block; }
    .chiste-texto { font-family:'Nunito',sans-serif; font-size:1rem; font-weight:600; line-height:1.7; color:#e2e8f0; margin-top:0.8rem; white-space:pre-wrap; }
    .btn-add-chiste { margin-top:1.5rem; width:100%; padding:1rem; background:transparent; border:2px dashed rgba(245,197,24,0.3); border-radius:var(--r); color:var(--yellow); font-family:'Fredoka One',cursive; font-size:1rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
    .btn-add-chiste:hover { border-color:var(--yellow); background:rgba(245,197,24,0.05); }

    /* BOTONES */
    .btn { display:inline-flex; align-items:center; gap:0.3rem; padding:0.45rem 0.8rem; border-radius:8px; font-family:'Nunito',sans-serif; font-size:0.75rem; font-weight:800; cursor:pointer; border:none; transition:all 0.15s; white-space:nowrap; }
    .btn:hover { transform:translateY(-1px); }
    .btn-primary { background:var(--yellow); color:#1a1a2e; }
    .btn-primary:hover { background:var(--yellow2); }
    .btn-ghost { background:transparent; color:var(--dim); border:1px solid rgba(160,174,192,0.3); }
    .btn-ghost:hover { color:var(--white); border-color:var(--dim); }
    .btn-danger { background:transparent; color:#f87171; border:1px solid rgba(248,113,113,0.3); }
    .btn-danger:hover { background:rgba(248,113,113,0.1); border-color:#f87171; }
    .btn-row { display:flex; gap:0.8rem; flex-wrap:wrap; align-items:center; margin-top:1.2rem; }

    /* MODALES */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500; display:none; align-items:center; justify-content:center; padding:1rem; }
    .modal-backdrop.open { display:flex; }
    .modal { background:var(--bg2); border:2px solid var(--yellow); border-radius:var(--r); padding:1.8rem; width:100%; max-width:500px; box-shadow:0 0 40px rgba(245,197,24,0.2); }
    .modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.3rem; padding-bottom:0.8rem; border-bottom:1px solid var(--border); }
    .modal-hdr h3 { font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--yellow); letter-spacing:1px; }
    .btn-close { background:none; border:none; color:var(--dim); font-size:1.2rem; cursor:pointer; }
    .btn-close:hover { color:var(--white); }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1rem; }
    label { font-size:0.72rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--dim); }
    input[type="text"] { padding:0.7rem 1rem; background:var(--bg3); border:2px solid var(--border); border-radius:8px; color:var(--white); font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:600; outline:none; width:100%; }
    input[type="text"]:focus { border-color:var(--yellow); }
    textarea.chiste-input { width:100%; min-height:140px; padding:0.8rem 1rem; background:var(--bg3); border:2px solid var(--border); border-radius:8px; color:var(--white); font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:600; outline:none; resize:vertical; line-height:1.6; }
    textarea.chiste-input:focus { border-color:var(--yellow); }
    textarea.chiste-input::placeholder { color:var(--dim); font-style:italic; }
    .voice-row { display:flex; gap:0.6rem; align-items:flex-start; }
    .voice-row textarea { flex:1; }
    .btn-mic { width:44px; height:44px; flex-shrink:0; background:var(--bg3); border:2px solid var(--border); border-radius:8px; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .btn-mic:hover { border-color:var(--yellow); }
    .btn-mic.recording { border-color:#f87171; background:rgba(248,113,113,0.15); animation:micPulse 1s infinite; }
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.4)} 50%{box-shadow:0 0 0 6px rgba(248,113,113,0)} }

    .empty { text-align:center; padding:3rem 1rem; color:var(--dim); }
    .empty-icon { font-size:3rem; margin-bottom:0.8rem; display:block; }
    .empty h3 { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--dim); }

    .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--bg2); border:2px solid var(--yellow); border-radius:10px; padding:0.8rem 1.5rem; font-size:0.85rem; font-weight:800; color:var(--yellow); opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.err { border-color:#f87171; color:#f87171; }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(245,197,24,0.3); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:500px) {
      header { padding:0 1rem; }
      .logo-text { font-size:1.6rem; }
      main { padding:1.2rem 0.8rem 3rem; }
      .temas-grid { grid-template-columns:repeat(2,1fr); }
      .user-cards { flex-direction:column; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- PANTALLA 1: SELECCIÓN USUARIO -->
<div class="auth-layer show" id="layer-usuarios">
  <div class="user-box">
    <h2>CHISTÓN</h2>
    <p>¿Quién eres?</p>
    <div class="user-cards">
      <div class="user-card" id="user-carlos">
        <div class="user-card-emoji">🎭</div>
        <div class="user-card-name">CARLOS</div>
      </div>
      <div class="user-card" id="user-cris">
        <div class="user-card-emoji">🌟</div>
        <div class="user-card-name">CRIS</div>
      </div>
    </div>
  </div>
</div>

<!-- PANTALLA 2: PIN -->
<div class="auth-layer" id="layer-pin">
  <div class="pin-box">
    <h3 id="pin-tit">USUARIO</h3>
    <p class="sub">INTRODUCE TU PIN</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-keypad" id="pin-kp"></div>
    <div class="pin-msg" id="pin-msg"></div>
  </div>
</div>

<!-- APP -->
<header id="app-hdr" style="display:none">
  <div class="logo" id="logo-btn">
    <span class="logo-text">CHISTÓN</span>
  </div>
  <span class="hdr-user" id="hdr-user-btn"></span>
</header>

<main id="app-main" style="display:none">

  <!-- HOME -->
  <div class="screen active" id="s-home">
    <div class="home-header">
      <h1>TEMÁTICA</h1>
      <p id="home-sub">Toca un tema para ver sus chistes</p>
    </div>
    <div class="temas-header">
      <div class="temas-count" id="temas-count">Cargando...</div>
      <div class="temas-right">
        <div class="num-wrap">
          <span class="num-label">Cuéntame</span>
          <input class="inp-num" type="number" id="inp-num-chistes" min="1" max="50" value="25">
          <span class="num-label">chistes</span>
        </div>
        <button class="btn-cuentame" id="btn-cuentame">🎤 Cuéntame</button>
      </div>
    </div>
    <div class="temas-grid" id="temas-grid">
      <div style="text-align:center;padding:2rem;grid-column:1/-1;color:var(--dim)">
        <span class="spinner"></span> Cargando...
      </div>
    </div>
  </div>

  <!-- CHISTES -->
  <div class="screen" id="s-chistes">
    <button class="back-btn" id="back-chistes">← Volver a temas</button>
    <div class="page-hdr">
      <div>
        <h1 id="tema-title">TEMA</h1>
        <div class="page-sub" id="tema-sub"></div>
      </div>
      <button class="btn-subir-top" id="btn-subir-top">⬆ Subir una pos.</button>
    </div>
    <div class="chistes-list" id="chistesList"></div>
    <button class="btn-add-chiste" id="btn-add-chiste">＋ Añadir chiste</button>
  </div>

</main>

<!-- MODAL TEMA -->
<div class="modal-backdrop" id="m-tema">
  <div class="modal">
    <div class="modal-hdr"><h3 id="m-tema-titulo">Nuevo tema</h3><button class="btn-close" id="close-m-tema">✕</button></div>
    <div class="form-group"><label>Nombre del tema</label><input type="text" id="inp-tema" placeholder="Ej: CURAS, MÉDICOS..."></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save-tema">Guardar</button>
      <button class="btn btn-ghost" id="btn-cancel-tema">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL CHISTE -->
<div class="modal-backdrop" id="m-chiste">
  <div class="modal">
    <div class="modal-hdr"><h3 id="m-chiste-titulo">Nuevo chiste</h3><button class="btn-close" id="close-m-chiste">✕</button></div>
    <div class="form-group"><label>Nombre / título</label><input type="text" id="inp-chiste-nombre" placeholder="Ej: El cura y el taxi"></div>
    <div class="form-group">
      <label>El chiste</label>
      <div class="voice-row">
        <textarea class="chiste-input" id="inp-chiste-texto" placeholder="Escribe el chiste aquí o usa el micrófono..."></textarea>
        <button class="btn-mic" id="btn-mic-chiste" title="Voz">🎙</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save-chiste">Guardar</button>
      <button class="btn btn-ghost" id="btn-cancel-chiste">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set, push, remove, onValue }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  authDomain:        "listify-16b5d.firebaseapp.com",
  databaseURL:       "https://listify-16b5d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "listify-16b5d",
  storageBucket:     "listify-16b5d.appspot.com",
  messagingSenderId: "238610923350",
  appId:             "1:238610923350:web:cd5c2c3fb23b5c0afba0f7"
};
const app = initializeApp(FB);
const db  = getDatabase(app);

const LS_KEY = 'chiston_usuario';
const USUARIOS = {
  carlos: { emoji:'🎭', label:'CARLOS' },
  cris:   { emoji:'🌟', label:'CRIS'   }
};

// ── ESTADO ────────────────────────────────────────────────────
let usuario         = null;
let temasData       = {};
let currentTemaKey  = null;

// ── UTILS ─────────────────────────────────────────────────────
let _toastT;
function toast(msg, tipo='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (tipo==='err'?' err':'');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2800);
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function setBreadcrumb(items) {
  const bc = document.getElementById('bc');
  if (!items.length) { bc.innerHTML=''; return; }
  bc.innerHTML = items.map((item,i) => {
    const isLast = i===items.length-1;
    return `<span class="bc-item${isLast?' active':''}" data-idx="${i}">${item.label}</span>${isLast?'':'<span class="bc-sep">›</span>'}`;
  }).join('');
  bc.querySelectorAll('.bc-item').forEach(el =>
    el.addEventListener('click', () => items[parseInt(el.dataset.idx)].action()));
}

// ── SHA-256 ───────────────────────────────────────────────────
async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── TECLADO PIN ───────────────────────────────────────────────
function buildKeypad(containerId, { onDigit, onDel, onBack }) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  ['1','2','3','4','5','6','7','8','9','‹ volver','0','⌫'].forEach(k => {
    const btn = document.createElement('button');
    const isBack = k.includes('volver');
    const isDel  = k==='⌫';
    btn.className = 'pin-key'+(isDel?' del':'')+(isBack?' volver':'');
    btn.textContent = k;
    if (isDel)  btn.onclick = onDel;
    else if (isBack) btn.onclick = onBack;
    else btn.onclick = () => onDigit(k);
    c.appendChild(btn);
  });
}
function updateDots(n, error=false) {
  document.getElementById('pin-dots').querySelectorAll('.pin-dot').forEach((d,i) => {
    d.classList.remove('filled','error');
    if (error) d.classList.add('error');
    else if (i<n) d.classList.add('filled');
  });
}

// ── ARRANQUE ──────────────────────────────────────────────────
async function init() {
  const saved = localStorage.getItem(LS_KEY);
  if (saved && USUARIOS[saved]) {
    const snap = await get(R.pin(saved));
    if (snap.exists()) { await entrar(saved); return; }
    localStorage.removeItem(LS_KEY);
  }
  mostrarSeleccion();
}

// ── PANTALLA SELECCIÓN ────────────────────────────────────────
function mostrarSeleccion() {
  document.getElementById('layer-pin').classList.remove('show');
  document.getElementById('layer-usuarios').classList.add('show');
  document.getElementById('app-hdr').style.display = 'none';
  document.getElementById('app-main').style.display = 'none';
}

// ── LOGIN PIN ─────────────────────────────────────────────────
async function pedirPin(u) {
  const snap = await get(R.pin(u));
  // Si no tiene PIN aún → primer acceso, crear PIN
  if (!snap.exists()) {
    await crearPin(u);
    return;
  }
  const hashGuardado = snap.val();
  document.getElementById('pin-tit').textContent = USUARIOS[u].label;
  document.getElementById('pin-msg').textContent = '';
  updateDots(0);
  document.getElementById('layer-usuarios').classList.remove('show');
  document.getElementById('layer-pin').classList.add('show');

  let pin = '';
  buildKeypad('pin-kp', {
    onDigit: async d => {
      if (pin.length>=4) return;
      pin+=d; updateDots(pin.length);
      if (pin.length===4) {
        const hash = await sha256(pin);
        if (hash===hashGuardado) {
          document.getElementById('layer-pin').classList.remove('show');
          await entrar(u);
        } else {
          document.getElementById('pin-msg').textContent = 'PIN incorrecto';
          updateDots(4, true);
          await delay(800);
          pin=''; updateDots(0);
          document.getElementById('pin-msg').textContent='';
        }
      }
    },
    onDel:  () => { pin=pin.slice(0,-1); updateDots(pin.length); },
    onBack: () => { document.getElementById('layer-pin').classList.remove('show'); mostrarSeleccion(); }
  });
}

// Primer acceso: crear PIN (2 pasos)
async function crearPin(u) {
  document.getElementById('pin-tit').textContent = USUARIOS[u].label;
  document.getElementById('pin-msg').textContent = 'Elige tu PIN de 4 dígitos';
  updateDots(0);
  document.getElementById('layer-usuarios').classList.remove('show');
  document.getElementById('layer-pin').classList.add('show');

  let pin1='', pin2='', paso=1;
  buildKeypad('pin-kp', {
    onDigit: async d => {
      if (paso===1) {
        if (pin1.length>=4) return;
        pin1+=d; updateDots(pin1.length);
        if (pin1.length===4) {
          await delay(200);
          pin2=''; paso=2;
          updateDots(0);
          document.getElementById('pin-msg').textContent='Confirma el PIN';
        }
      } else {
        if (pin2.length>=4) return;
        pin2+=d; updateDots(pin2.length);
        if (pin2.length===4) {
          if (pin2!==pin1) {
            document.getElementById('pin-msg').textContent='No coinciden';
            updateDots(4,true);
            await delay(800);
            pin1=''; pin2=''; paso=1; updateDots(0);
            document.getElementById('pin-msg').textContent='Elige tu PIN de 4 dígitos';
          } else {
            const hash = await sha256(pin1);
            await set(R.pin(u), hash);
            document.getElementById('layer-pin').classList.remove('show');
            toast('✓ PIN creado. ¡Bienvenido!');
            await entrar(u);
          }
        }
      }
    },
    onDel: () => {
      if (paso===1) { pin1=pin1.slice(0,-1); updateDots(pin1.length); }
      else          { pin2=pin2.slice(0,-1); updateDots(pin2.length); }
    },
    onBack: () => { document.getElementById('layer-pin').classList.remove('show'); mostrarSeleccion(); }
  });
}

// ── ENTRAR EN LA APP ──────────────────────────────────────────
async function entrar(u) {
  usuario = u;
  localStorage.setItem(LS_KEY, u);
  document.getElementById('layer-usuarios').classList.remove('show');
  document.getElementById('layer-pin').classList.remove('show');
  document.getElementById('app-hdr').style.display = 'flex';
  document.getElementById('app-main').style.display = 'block';
  document.getElementById('hdr-user-btn').textContent = USUARIOS[u].label;
  document.getElementById('home-sub').textContent = 'Hola ' + USUARIOS[u].label + ' 😄 Toca un tema para ver sus chistes';

  // Cargar numChistes guardado
  const snapN = await get(R.numChistes());
  if (snapN.exists()) document.getElementById('inp-num-chistes').value = snapN.val();

  suscribir();
}

function cambiarUsuario() {
  if (unsub) { unsub(); unsub=null; }
  usuario=null; temasData={};
  localStorage.removeItem(LS_KEY);
  document.getElementById('app-hdr').style.display='none';
  document.getElementById('app-main').style.display='none';
  mostrarSeleccion();
}

// ── FIREBASE REAL-TIME ────────────────────────────────────────
function suscribir() {
  if (unsub) unsub();
  unsub = onValue(R.temas(), snap => {
    temasData = snap.val() || {};
    renderTemas();
    if (currentTemaKey && document.getElementById('s-chistes').classList.contains('active'))
      renderChistes();
  });
}

// ── EMOJIS ────────────────────────────────────────────────────
const EMOJIS=['😂','🤣','😆','😄','🎭','🃏','🎪','🤡','🎠','🎈','⭐','🌟','💥','🎯','🎲'];
function emojiForTema(n) {
  let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))&0xFFFF;
  return EMOJIS[h%EMOJIS.length];
}

// ── RENDER TEMAS ──────────────────────────────────────────────
function renderTemas() {
  const grid  = document.getElementById('temas-grid');
  const items = Object.entries(temasData).sort(([,a],[,b])=>a.nombre.localeCompare(b.nombre));
  document.getElementById('temas-count').textContent = items.length+' tema'+(items.length!==1?'s':'');
  grid.innerHTML='';
  items.forEach(([key,t]) => {
    const nC = Object.keys(t.chistes||{}).length;
    const card = document.createElement('div');
    card.className='tema-card'+(key===selectedTemaKey?' selected':'');
    card.dataset.key=key;
    card.innerHTML=`
      <div class="tema-emoji">${emojiForTema(t.nombre)}</div>
      <div class="tema-nombre">${t.nombre}</div>
      <div class="tema-count">${nC} chiste${nC!==1?'s':''}</div>
      <div class="tema-options">
        <button class="tema-opt tema-opt-enter">▶ Ver chistes</button>
        <button class="tema-opt tema-opt-edit">✏️ Editar</button>
        <button class="tema-opt tema-opt-delete">🗑️ Eliminar</button>
      </div>`;
    card.addEventListener('click', e => {
      if (e.target.closest('.tema-options')) return;
      if (selectedTemaKey===key) { selectedTemaKey=null; card.classList.remove('selected'); }
      else { selectedTemaKey=key; grid.querySelectorAll('.tema-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); }
    });
    card.querySelector('.tema-opt-enter').addEventListener('click',  e=>{e.stopPropagation();selectedTemaKey=null;goTema(key);});
    card.querySelector('.tema-opt-edit').addEventListener('click',   e=>{e.stopPropagation();openEditTema(key,t.nombre);});
    card.querySelector('.tema-opt-delete').addEventListener('click', e=>{e.stopPropagation();selectedTemaKey=null;deleteTema(key,t.nombre);});
    grid.appendChild(card);
  });
  const addCard=document.createElement('div');
  addCard.className='tema-add-card';
  addCard.innerHTML='<span class="tema-add-icon">＋</span><span>Nuevo tema</span>';
  addCard.addEventListener('click',openModalTema);
  grid.appendChild(addCard);
}

// ── RENDER CHISTES ────────────────────────────────────────────
function goTema(key) {
  currentTemaKey=key;
  const tema=temasData[key]; if(!tema) return;
  document.getElementById('tema-title').textContent=tema.nombre;
  normalizarOrden(key).then(()=>renderChistes());
  showScreen('s-chistes');
}

async function normalizarOrden(temaKey) {
  const chistes = temasData[temaKey]?.chistes || {};
  const items = Object.entries(chistes).sort(([,a],[,b]) => (a.orden ?? a.ts ?? 0) - (b.orden ?? b.ts ?? 0));
  for (let i = 0; i < items.length; i++) {
    const [k, c] = items[i];
    if (c.orden !== i) await set(R.chisteOrden(temaKey, k), i);
  }
}
function goHome() { currentTemaKey=null; showScreen('s-home'); }

function renderChistes() {
  const tema=temasData[currentTemaKey]; if(!tema) return;
  const chistes=tema.chistes||{};
  const items=Object.entries(chistes).sort(([,a],[,b])=>(a.orden??a.ts??0)-(b.orden??b.ts??0));
  document.getElementById('tema-sub').textContent=items.length+' chiste'+(items.length!==1?'s':'');
  const list=document.getElementById('chistesList');
  list.innerHTML='';
  if(!items.length){list.innerHTML='<div class="empty"><span class="empty-icon">🦗</span><h3>No hay chistes aún</h3></div>';return;}
  items.forEach(([cKey,c])=>{
    const row=document.createElement('div');
    row.className='chiste-row'; row.id='chiste-'+cKey;
    row.innerHTML=`
      <div class="chiste-hdr">
        <div class="chiste-hdr-left">
          <input type="checkbox" class="chiste-check" data-key="${cKey}" title="Seleccionar">
          <span class="chiste-chevron">▶</span>
          <span class="chiste-nombre">${c.nombre}</span>
        </div>
        <div class="chiste-acts">
          <button class="btn btn-ghost" title="Editar">✏️</button>
          <button class="btn btn-danger" title="Eliminar">🗑️</button>
        </div>
      </div>
      <div class="chiste-body">
        <div class="chiste-texto">${(c.texto||'').replace(/</g,'&lt;')}</div>
      </div>`;
    const chk=row.querySelector('.chiste-check');
    if(cKey===selectedChisteKey) chk.checked=true;
    chk.addEventListener('change',()=>{
      if(chk.checked){document.querySelectorAll('.chiste-check').forEach(c=>{if(c!==chk)c.checked=false;});selectedChisteKey=cKey;}
      else selectedChisteKey=null;
    });
    row.querySelector('.chiste-hdr').addEventListener('click',e=>{
      if(e.target.closest('.chiste-acts')||e.target.classList.contains('chiste-check')) return;
      desactivarCheck(); row.classList.toggle('open');
    });
    const acts=row.querySelector('.chiste-acts');
    acts.addEventListener('click',e=>e.stopPropagation());
    acts.querySelector('.btn-ghost').addEventListener('click',()=>{desactivarCheck();openEditChiste(cKey,c);});
    acts.querySelector('.btn-danger').addEventListener('click',()=>{desactivarCheck();deleteChiste(cKey,c.nombre);});
    list.appendChild(row);
  });
}

function desactivarCheck(){selectedChisteKey=null;document.querySelectorAll('.chiste-check').forEach(c=>c.checked=false);}

// ── SUBIR UNA POSICIÓN ────────────────────────────────────────
async function subirUnaPos() {
  if(!selectedChisteKey){toast('⚠ Selecciona un chiste primero','err');return;}
  const chistes=temasData[currentTemaKey]?.chistes||{};
  const items=Object.entries(chistes).sort(([,a],[,b])=>(a.orden??a.ts??0)-(b.orden??b.ts??0));
  const idx=items.findIndex(([k])=>k===selectedChisteKey);
  if(idx<=0){toast('Ya está el primero 👆','err');return;}
  const [keyA]=items[idx-1];
  const [keyB]=items[idx];
  // Intercambiar con valores consecutivos garantizados
  await set(R.chisteOrden(currentTemaKey,keyA), idx);
  await set(R.chisteOrden(currentTemaKey,keyB), idx-1);
  toast('⬆ Subido una posición');
}

// ── CRUD TEMAS ────────────────────────────────────────────────
function openModalTema(){editTemaKey=null;document.getElementById('m-tema-titulo').textContent='Nuevo tema 🎭';document.getElementById('inp-tema').value='';openModal('m-tema');setTimeout(()=>document.getElementById('inp-tema').focus(),150);}
function openEditTema(key,nombre){editTemaKey=key;document.getElementById('m-tema-titulo').textContent='Editar tema ✏️';document.getElementById('inp-tema').value=nombre;openModal('m-tema');setTimeout(()=>document.getElementById('inp-tema').focus(),150);}
async function saveTema(){
  const nombre=document.getElementById('inp-tema').value.trim().toUpperCase();
  if(!nombre)return;
  if(Object.entries(temasData).some(([k,t])=>t.nombre===nombre&&k!==editTemaKey)){toast(`⚠ Ya existe "${nombre}"`,'err');return;}
  if(editTemaKey){await set(R.temaNombre(editTemaKey),nombre);toast('✓ Tema actualizado');}
  else{await push(R.temas(),{nombre,chistes:{}});toast('✓ Tema creado 🎉');}
  closeModal('m-tema');
}
async function deleteTema(key,nombre){
  if(!confirm(`¿Eliminar el tema "${nombre}" y todos sus chistes?`))return;
  await remove(R.tema(key));toast('🗑 Tema eliminado');
}

// ── CRUD CHISTES ──────────────────────────────────────────────
function openModalChiste(){editChisteKey=null;desactivarCheck();document.getElementById('m-chiste-titulo').textContent='Nuevo chiste 😂';document.getElementById('inp-chiste-nombre').value='';document.getElementById('inp-chiste-texto').value='';openModal('m-chiste');setTimeout(()=>document.getElementById('inp-chiste-nombre').focus(),150);}
function openEditChiste(key,c){editChisteKey=key;document.getElementById('m-chiste-titulo').textContent='Editar chiste ✏️';document.getElementById('inp-chiste-nombre').value=c.nombre||'';document.getElementById('inp-chiste-texto').value=c.texto||'';openModal('m-chiste');setTimeout(()=>document.getElementById('inp-chiste-nombre').focus(),150);}
async function saveChiste(){
  const nombre=document.getElementById('inp-chiste-nombre').value.trim();
  const texto=document.getElementById('inp-chiste-texto').value.trim();
  if(!nombre){toast('⚠ Escribe un nombre','err');return;}
  if(!texto){toast('⚠ Escribe el chiste','err');return;}

  else{await push(R.chistes(currentTemaKey),{nombre,texto,ts:Date.now()});toast('✓ Chiste guardado 😄');}
  closeModal('m-chiste');

async function deleteChiste(key,nombre){
  if(!confirm(`¿Eliminar "${nombre}"?`))return;
  await remove(R.chiste(currentTemaKey,key));toast('🗑 Chiste eliminado');
}

// ── CUÉNTAME ──────────────────────────────────────────────────
async function guardarNumChistes(n) {
  if(usuario) await set(R.numChistes(), n);
}

async function generarCuentame() {
  const n = parseInt(document.getElementById('inp-num-chistes').value)||25;
  const temas=Object.entries(temasData).sort(([,a],[,b])=>a.nombre.localeCompare(b.nombre));
  if(!temas.length){toast('⚠ No hay temas todavía','err');return;}
  const listas=temas.map(([,t])=>Object.values(t.chistes||{}).sort((a,b)=>(a.orden??a.ts??0)-(b.orden??b.ts??0))).filter(l=>l.length>0);
  if(!listas.length){toast('⚠ No hay chistes todavía','err');return;}
  const resultado=[];
  let ronda=0;
  while(resultado.length<n){
    let alguno=false;
    for(const lista of listas){if(lista[ronda]){resultado.push(lista[ronda]);alguno=true;if(resultado.length>=n)break;}}
    if(!alguno)break;
    ronda++;
  }
  if(!resultado.length){toast('⚠ No hay chistes para generar','err');return;}
  await guardarNumChistes(n);
  generarPDF(resultado, n);
}

async function generarPDF(chistes, n) {
  if(!window.jspdf){
    await new Promise((resolve,reject)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=resolve;s.onerror=reject;document.head.appendChild(s);});
  }
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=210,margin=20,maxW=pageW-margin*2;
  let y=30;
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(180,100,0);
  doc.text(`CHISTÓN — Los ${n} Mejores`,pageW/2,y,{align:'center'});
  y+=8;
  doc.setFontSize(10);doc.setTextColor(120,120,120);doc.setFont('helvetica','normal');
  doc.text(new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'}),pageW/2,y,{align:'center'});
  y+=12;
  doc.setDrawColor(245,197,24);doc.setLineWidth(0.8);doc.line(margin,y,pageW-margin,y);y+=10;
  chistes.forEach((c,i)=>{
    if(y>270){doc.addPage();y=20;}
    doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(180,100,0);
    doc.text(`${i+1}. ${c.nombre}`,margin,y);y+=7;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(40,40,40);
    const lineas=doc.splitTextToSize(c.texto||'',maxW);
    lineas.forEach(l=>{if(y>275){doc.addPage();y=20;}doc.text(l,margin,y);y+=5.5;});
    y+=6;
    if(i<chistes.length-1){doc.setDrawColor(220,220,220);doc.setLineWidth(0.3);doc.line(margin,y-3,pageW-margin,y-3);}
  });
  doc.setFontSize(8);doc.setTextColor(160,160,160);
  doc.text('Generado con CHISTÓN 😂',pageW/2,290,{align:'center'});
  doc.save(`chiston_${n}_mejores.pdf`);
  toast('✓ PDF generado 🎉');
}

// ── VOZ ───────────────────────────────────────────────────────
function toggleVoz(){
  if(!(window.SpeechRecognition||window.webkitSpeechRecognition)){toast('⚠ Voz no disponible. Usa Chrome.','err');return;}
  if(isRecording){if(recognition)recognition.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR(); recognition.lang='es-ES'; recognition.continuous=true; recognition.interimResults=true;
  const btn=document.getElementById('btn-mic-chiste');
  const textarea=document.getElementById('inp-chiste-texto');
  let textoFinal='';

  recognition.onstart=()=>{isRecording=true;btn.classList.add('recording');btn.textContent='🔴';textoFinal=textarea.value;};
  recognition.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) textoFinal+=(textoFinal&&!textoFinal.endsWith(' ')?'. ':'')+e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    textarea.value=textoFinal+(interim?' ['+interim+']':'');
  };
  recognition.onend=()=>{
    isRecording=false;btn.classList.remove('recording');btn.textContent='🎙';
    textarea.value=textoFinal;
    recognition=null;
  };
  recognition.onerror=e=>{
    isRecording=false;btn.classList.remove('recording');btn.textContent='🎙';
    textarea.value=textoFinal;
    recognition=null;
    if(e.error==='not-allowed')toast('⚠ Permiso denegado','err');
  };
  recognition.start();
}

document.getElementById('btn-add-chiste').addEventListener('click', openModalChiste);
document.getElementById('btn-subir-top').addEventListener('click', subirUnaPos);
document.getElementById('btn-cuentame').addEventListener('click', generarCuentame);

// Guardar num chistes al cambiar
document.getElementById('inp-num-chistes').addEventListener('change', function() {
  let v=parseInt(this.value)||25;
  if(v<1)v=1; if(v>50)v=50;
  this.value=v;
  guardarNumChistes(v);
});

document.getElementById('btn-save-tema').addEventListener('click', saveTema);
document.getElementById('btn-cancel-tema').addEventListener('click', ()=>closeModal('m-tema'));
document.getElementById('close-m-tema').addEventListener('click', ()=>closeModal('m-tema'));
document.getElementById('inp-tema').addEventListener('keydown', e=>{if(e.key==='Enter')saveTema();});

document.getElementById('btn-save-chiste').addEventListener('click', saveChiste);
document.getElementById('btn-cancel-chiste').addEventListener('click', ()=>closeModal('m-chiste'));
document.getElementById('close-m-chiste').addEventListener('click', ()=>closeModal('m-chiste'));
document.getElementById('btn-mic-chiste').addEventListener('click', toggleVoz);
document.getElementById('inp-chiste-nombre').addEventListener('keydown', e=>{if(e.key==='Enter')document.getElementById('inp-chiste-texto').focus();});

// ── ARRANQUE ──────────────────────────────────────────────────
init();
